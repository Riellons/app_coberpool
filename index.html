<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle da Piscina</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:340px;
    background: rgba(30,41,59,0.9);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    text-align:center;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    margin-bottom:10px;
    font-size:26px;
}

.subtitle{
    font-size:13px;
    color:#cbd5f5;
    margin-bottom:20px;
}

.status{
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
    background:#111827;
}

button{
    width:100%;
    border:none;
    padding:15px;
    margin:10px 0;   
    font-size:17px;
    border-radius:12px;
    cursor:pointer;
    transition:0.25s;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

button:disabled{
    opacity:0.5;
}

.abrir{
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

.fechar{
    background: linear-gradient(135deg, #ef4444, #b91c1c);
}

.parar{
    background: linear-gradient(135deg, #f59e0b, #d97706);
}

button:hover{
    transform:scale(1.05);
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}

.loader{
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid white;
    border-radius:50%;
    width:18px;
    height:18px;
    animation: spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<h1>🏊 Piscina</h1>
<div class="subtitle">Controle da cobertura</div>

<div class="status" id="status">
Status: Parado
</div>

<button class="abrir" onclick="enviarComando('open')">
<span>⬆ Abrir</span>
<div class="loader" id="loadOpen"></div>
</button>

<button class="fechar" onclick="enviarComando('close')">
<span>⬇ Fechar</span>
<div class="loader" id="loadClose"></div>
</button>

<button class="parar" onclick="enviarComando('stop')">
<span>⏹ Parar</span>
<div class="loader" id="loadStop"></div>
</button>

<div class="footer">
Sistema inteligente de cobertura
</div>

</div>

<script>

const BASE_URL = "http://192.168.0.100"; // depois você muda

function setStatus(texto, cor){
    const status = document.getElementById("status");
    status.innerHTML = texto;
    status.style.background = cor;
}

function desativarBotoes(state){
    document.querySelectorAll("button").forEach(btn => {
        btn.disabled = state;
    });
}

function mostrarLoader(id){
    document.getElementById(id).style.display = "inline-block";
}

function esconderLoaders(){
    document.querySelectorAll(".loader").forEach(l => {
        l.style.display = "none";
    });
}

function enviarComando(comando){

    desativarBotoes(true);
    esconderLoaders();

    if(comando === "open"){
        setStatus("Abrindo...", "#065f46");
        mostrarLoader("loadOpen");
    }

    if(comando === "close"){
        setStatus("Fechando...", "#7f1d1d");
        mostrarLoader("loadClose");
    }

    if(comando === "stop"){
        setStatus("Parado", "#111827");
        mostrarLoader("loadStop");
    }

    fetch(`${BASE_URL}/${comando}`)
    .catch(() => setStatus("Erro de conexão", "#7f1d1d"))
    .finally(() => {
        esconderLoaders();
        setTimeout(()=>desativarBotoes(false), 2000);
    });
}

</script>

</body>
</html>
